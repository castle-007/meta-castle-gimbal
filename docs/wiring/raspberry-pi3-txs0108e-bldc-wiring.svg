<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK KR", "NanumGothic", sans-serif; fill: #18212b; }
      .title { font-size: 34px; font-weight: 700; }
      .h2 { font-size: 25px; font-weight: 700; }
      .label { font-size: 20px; font-weight: 700; }
      .body { font-size: 18px; }
      .small { font-size: 15px; }
      .warn { fill: #b42318; font-weight: 700; }
      .box { fill: #fff; stroke: #6b7785; stroke-width: 3; }
      .pwm { fill: none; stroke: #1769aa; stroke-width: 7; }
      .gnd { fill: none; stroke: #222; stroke-width: 7; }
      .v33 { fill: none; stroke: #2e7d32; stroke-width: 7; }
      .v5 { fill: none; stroke: #e67e22; stroke-width: 7; }
      .power { fill: none; stroke: #c62828; stroke-width: 7; }
    </style>
  </defs>

  <rect width="1800" height="1200" fill="#f6f8fa"/>
  <text x="55" y="55" class="title">Raspberry Pi 3 + TXS0108E 모듈 + BLDC 드라이버 2개</text>
  <text x="55" y="88" class="body warn">전원 OFF 상태에서 배선합니다. 아래 그림은 모터선 개수와 관계없는 제어 신호 배선입니다.</text>

  <!-- Raspberry Pi -->
  <g transform="translate(55,125)">
    <rect width="520" height="800" rx="18" fill="#4f9b58" stroke="#275e32" stroke-width="5"/>
    <text x="28" y="45" class="h2" fill="#fff">Raspberry Pi 3</text>
    <text x="28" y="75" class="body" fill="#fff">USB/LAN 포트가 아래쪽인 방향</text>
    <rect x="115" y="250" width="235" height="215" rx="8" fill="#d7dce0" stroke="#5f6368" stroke-width="3"/>
    <text x="180" y="365" class="label">BCM2837</text>
    <rect x="130" y="690" width="105" height="110" fill="#c6cbd0" stroke="#5f6368" stroke-width="3"/>
    <rect x="260" y="690" width="105" height="110" fill="#c6cbd0" stroke="#5f6368" stroke-width="3"/>
    <text x="170" y="675" class="body" fill="#fff">USB / LAN</text>

    <!-- Simplified 40-pin header with correct row locations -->
    <rect x="395" y="95" width="85" height="635" rx="6" fill="#30343b"/>
    <g fill="#f4c542">
      <circle cx="418" cy="115" r="9"/><circle cx="457" cy="115" r="9"/>
      <circle cx="418" cy="146" r="9"/><circle cx="457" cy="146" r="9"/>
      <circle cx="418" cy="177" r="9"/><circle cx="457" cy="177" r="9"/>
      <circle cx="418" cy="208" r="9"/><circle cx="457" cy="208" r="9"/>
      <circle cx="418" cy="239" r="9"/><circle cx="457" cy="239" r="9"/>
      <circle cx="418" cy="270" r="9"/><circle cx="457" cy="270" r="9"/>
      <circle cx="418" cy="301" r="9"/><circle cx="457" cy="301" r="9"/>
      <circle cx="418" cy="332" r="9"/><circle cx="457" cy="332" r="9"/>
      <circle cx="418" cy="363" r="9"/><circle cx="457" cy="363" r="9"/>
      <circle cx="418" cy="394" r="9"/><circle cx="457" cy="394" r="9"/>
      <circle cx="418" cy="425" r="9"/><circle cx="457" cy="425" r="9"/>
      <circle cx="418" cy="456" r="9"/><circle cx="457" cy="456" r="9"/>
      <circle cx="418" cy="487" r="9"/><circle cx="457" cy="487" r="9"/>
      <circle cx="418" cy="518" r="9"/><circle cx="457" cy="518" r="9"/>
      <circle cx="418" cy="549" r="9"/><circle cx="457" cy="549" r="9"/>
      <circle cx="418" cy="580" r="9"/><circle cx="457" cy="580" r="9"/>
      <circle cx="418" cy="611" r="9"/><circle cx="457" cy="611" r="9"/>
      <circle cx="418" cy="642" r="9"/><circle cx="457" cy="642" r="9"/>
      <circle cx="418" cy="673" r="9"/><circle cx="457" cy="673" r="9"/>
      <circle cx="418" cy="704" r="9"/><circle cx="457" cy="704" r="9"/>
    </g>
    <!-- Highlight pin 1, 2, 6, 12 and 35 -->
    <circle cx="418" cy="115" r="13" fill="#2e7d32"/>
    <circle cx="457" cy="115" r="13" fill="#e67e22"/>
    <circle cx="457" cy="177" r="13" fill="#222"/>
    <circle cx="457" cy="270" r="13" fill="#1769aa"/>
    <circle cx="418" cy="642" r="13" fill="#1769aa"/>

    <rect x="18" y="105" width="350" height="160" rx="6" fill="#fff" stroke="#54606c" stroke-width="2"/>
    <text x="35" y="138" class="label" fill="#2e7d32">핀 1: 3.3V → VA, OE</text>
    <text x="35" y="171" class="label" fill="#e67e22">핀 2: 5V → VB</text>
    <text x="35" y="204" class="label">핀 6: GND → 공통 GND</text>
    <text x="35" y="237" class="small">Pi의 5V는 모터 전원이 아닙니다.</text>

    <rect x="18" y="510" width="350" height="105" rx="6" fill="#fff" stroke="#1769aa" stroke-width="2"/>
    <text x="35" y="547" class="label" fill="#1769aa">핀 12: GPIO18/PWM0 → A1</text>
    <text x="35" y="585" class="label" fill="#1769aa">핀 35: GPIO19/PWM1 → A2</text>
  </g>

  <!-- TXS module -->
  <g transform="translate(650,170)">
    <rect width="480" height="650" rx="10" class="box"/>
    <text x="25" y="42" class="h2">TXS0108E 레벨 변환 모듈</text>
    <image x="35" y="65" width="410" height="410" preserveAspectRatio="xMidYMid meet"
           xlink:href="txs0108e-module.webp"/>
    <text x="28" y="505" class="label" fill="#2e7d32">VA  ← Pi 핀 1 (3.3V)</text>
    <text x="28" y="538" class="label" fill="#e67e22">VB  ← Pi 핀 2 (5V)</text>
    <text x="28" y="571" class="label">GND ← Pi 핀 6</text>
    <text x="28" y="604" class="label" fill="#2e7d32">OE  ← VA(3.3V)</text>
    <text x="28" y="635" class="small">A쪽: 3.3V / B쪽: 5V · 한 모듈로 PWM 2채널 사용</text>
  </g>

  <!-- Drivers -->
  <g transform="translate(1195,120)">
    <rect width="550" height="425" rx="10" class="box"/>
    <text x="22" y="38" class="h2">BLDC 드라이버 1</text>
    <image x="20" y="55" width="275" height="205" preserveAspectRatio="xMidYMid meet"
           xlink:href="bldc-driver.webp"/>
    <text x="310" y="82" class="label">제어 커넥터</text>
    <text x="310" y="116" class="body">1 BRK: 미연결</text>
    <text x="310" y="148" class="body">2 DIR: 미연결</text>
    <text x="310" y="180" class="body warn">3 FG: Pi 직결 금지</text>
    <text x="310" y="212" class="body" fill="#1769aa">4 VSP ← B1</text>
    <text x="310" y="244" class="body">5 GND ← 공통 GND</text>
    <text x="310" y="276" class="body warn">6 5V: 미연결</text>
    <rect x="20" y="300" width="510" height="95" rx="6" fill="#fff1f0" stroke="#b42318" stroke-width="2"/>
    <text x="38" y="333" class="label warn">외부 모터 전원</text>
    <text x="38" y="365" class="body">전원공급기 + → VCC / 전원공급기 - → GND</text>
    <text x="38" y="389" class="small">모터 정격전압을 확인하고 드라이버 허용범위 안에서 사용</text>
  </g>

  <g transform="translate(1195,620)">
    <rect width="550" height="425" rx="10" class="box"/>
    <text x="22" y="38" class="h2">BLDC 드라이버 2</text>
    <image x="20" y="55" width="275" height="205" preserveAspectRatio="xMidYMid meet"
           xlink:href="bldc-driver.webp"/>
    <text x="310" y="82" class="label">제어 커넥터</text>
    <text x="310" y="116" class="body">1 BRK: 미연결</text>
    <text x="310" y="148" class="body">2 DIR: 미연결</text>
    <text x="310" y="180" class="body warn">3 FG: Pi 직결 금지</text>
    <text x="310" y="212" class="body" fill="#1769aa">4 VSP ← B2</text>
    <text x="310" y="244" class="body">5 GND ← 공통 GND</text>
    <text x="310" y="276" class="body warn">6 5V: 미연결</text>
    <rect x="20" y="300" width="510" height="95" rx="6" fill="#fff1f0" stroke="#b42318" stroke-width="2"/>
    <text x="38" y="333" class="label warn">외부 모터 전원</text>
    <text x="38" y="365" class="body">전원공급기 + → VCC / 전원공급기 - → GND</text>
    <text x="38" y="389" class="small">두 드라이버와 Pi의 GND는 공통으로 연결</text>
  </g>

  <!-- Signal route labels -->
  <path d="M575 360 C610 360 615 350 650 350" class="v33"/>
  <text x="585" y="337" class="small" fill="#2e7d32">3.3V / OE</text>
  <path d="M575 405 C610 405 615 395 650 395" class="v5"/>
  <text x="590" y="435" class="small" fill="#e67e22">5V</text>
  <path d="M575 500 C610 500 615 500 650 500" class="gnd"/>
  <text x="590" y="485" class="small">GND</text>
  <path d="M575 610 C610 610 615 555 650 555" class="pwm"/>
  <text x="585" y="585" class="small" fill="#1769aa">PWM0 → A1</text>
  <path d="M575 690 C610 690 615 600 650 600" class="pwm"/>
  <text x="585" y="680" class="small" fill="#1769aa">PWM1 → A2</text>

  <path d="M1130 385 C1160 385 1160 330 1195 330" class="pwm"/>
  <text x="1138" y="365" class="small" fill="#1769aa">B1 → VSP1</text>
  <path d="M1130 680 C1160 680 1160 830 1195 830" class="pwm"/>
  <text x="1138" y="715" class="small" fill="#1769aa">B2 → VSP2</text>
  <path d="M1130 515 L1165 515 L1165 945 L1195 945" class="gnd"/>
  <path d="M1165 450 L1195 450" class="gnd"/>

  <!-- Connection table -->
  <rect x="55" y="1080" width="1690" height="82" rx="8" fill="#fff" stroke="#6b7785" stroke-width="2"/>
  <text x="78" y="1112" class="label">핵심 연결:</text>
  <text x="220" y="1112" class="body">GPIO18 → A1 / B1 → 드라이버1 VSP</text>
  <text x="650" y="1112" class="body">GPIO19 → A2 / B2 → 드라이버2 VSP</text>
  <text x="1100" y="1112" class="body">VA·OE=3.3V / VB=5V / GND 공통</text>
  <text x="78" y="1147" class="body warn">드라이버 제어 커넥터의 5V 출력은 이번 연결에서 사용하지 않습니다. FG도 연결하지 않습니다.</text>
</svg>
